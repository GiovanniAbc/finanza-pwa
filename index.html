<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Finanza">
  <meta name="application-name" content="Finanza">
  <meta name="robots" content="noindex, nofollow">

  <title>Finanza</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      background: #0f172a;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .topbar {
      min-height: 58px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    .icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 2px;
    }

    .open-external {
      margin-left: auto;
      padding: 10px 12px;
      border-radius: 12px;
      background: #22c55e;
      color: #052e16;
      font-size: 13px;
      font-weight: bold;
      text-decoration: none;
      white-space: nowrap;
    }

    iframe {
      width: 100%;
      flex: 1;
      border: 0;
      background: #0f172a;
    }

    .fallback {
      display: none;
      padding: 24px;
      text-align: center;
      background: #0f172a;
    }

    .fallback a {
      display: inline-block;
      margin-top: 18px;
      padding: 16px 22px;
      border-radius: 16px;
      background: #22c55e;
      color: #052e16;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <img class="icon" src="icon.svg" alt="Finanza">
    <div>
      <div class="title">Finanza</div>
      <div class="subtitle">Gestionale personale</div>
    </div>
    <a class="open-external" href="https://script.google.com/macros/s/AKfycbzPfvfyAh_U0ASqbNiUnFaht_8Z-z3-lM8EVwYBk4IAxtwBau9ad6BZvVexIRK8yT5_YQ/exec" target="_blank" rel="noopener">Apri</a>
  </header>

  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbzPfvfyAh_U0ASqbNiUnFaht_8Z-z3-lM8EVwYBk4IAxtwBau9ad6BZvVexIRK8yT5_YQ/exec"
    title="Finanza Personale Giovanni"
    allow="clipboard-read; clipboard-write">
  </iframe>

  <div class="fallback" id="fallback">
    <h1>Finanza</h1>
    <p>Se il gestionale non si carica qui dentro, aprilo con il pulsante sotto.</p>
    <a href="https://script.google.com/macros/s/AKfycbzPfvfyAh_U0ASqbNiUnFaht_8Z-z3-lM8EVwYBk4IAxtwBau9ad6BZvVexIRK8yT5_YQ/exec" target="_blank" rel="noopener">Apri gestionale</a>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js").catch(function() {});
    }

    const frame = document.getElementById("appFrame");
    const fallback = document.getElementById("fallback");

    setTimeout(function() {
      try {
        if (!frame || frame.clientHeight < 100) {
          fallback.style.display = "block";
        }
      } catch (e) {
        fallback.style.display = "block";
      }
    }, 3500);
  </script>
</body>
</html>
