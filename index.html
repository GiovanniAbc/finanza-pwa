<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Finanza">
  <meta name="application-name" content="Finanza">
  <meta name="robots" content="noindex, nofollow">

  <title>Finanza</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 28px;
      padding: 28px;
      text-align: center;
    }

    .icon {
      width: 112px;
      height: 112px;
      margin: 0 auto 18px auto;
      border-radius: 28px;
      overflow: hidden;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 34px;
      line-height: 1.1;
    }

    p {
      margin: 0 0 22px 0;
      color: #94a3b8;
      font-size: 18px;
      line-height: 1.4;
    }

    .button {
      display: block;
      width: 100%;
      min-height: 64px;
      border: none;
      border-radius: 20px;
      background: #22c55e;
      color: #052e16;
      font-size: 22px;
      font-weight: bold;
      text-decoration: none;
      line-height: 64px;
      cursor: pointer;
    }

    .secondary {
      margin-top: 14px;
      font-size: 14px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="icon" src="icon.svg" alt="Finanza">
    <h1>Finanza</h1>
    <p>Accesso rapido al tuo gestionale personale per movimenti, dashboard e patrimonio.</p>
    <a class="button" id="openApp" href="https://script.google.com/macros/s/AKfycbzPfvfyAh_U0ASqbNiUnFaht_8Z-z3-lM8EVwYBk4IAxtwBau9ad6BZvVexIRK8yT5_YQ/exec">Apri gestionale</a>
    <div class="secondary">Se non si apre automaticamente, premi il pulsante.</div>
  </main>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbzPfvfyAh_U0ASqbNiUnFaht_8Z-z3-lM8EVwYBk4IAxtwBau9ad6BZvVexIRK8yT5_YQ/exec";

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js").catch(function() {});
    }

    setTimeout(function() {
      window.location.href = APP_URL;
    }, 900);
  </script>
</body>
</html>
